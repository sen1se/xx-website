<script>
// ANTI VIEW-SOURCE
if (window.location.protocol === 'view-source:' || /view-source/.test(window.location.href)) {
    document.body.innerHTML = '<div style="background:#000;color:#f00;height:100vh;display:flex;align-items:center;justify-content:center;">ACCESS DENIED</div>';
    throw new Error('Blocked');
}

// Block keyboard shortcuts
document.addEventListener('keydown', function(e) {
    if(e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'u')) {
        e.preventDefault();
        alert('Access Denied');
    }
});
document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
document.addEventListener('copy', function(e) { e.preventDefault(); alert('Copy disabled'); });
document.addEventListener('cut', function(e) { e.preventDefault(); alert('Cut disabled'); });
document.addEventListener('paste', function(e) { e.preventDefault(); alert('Paste disabled'); });

// MAIN CODE
(function() {
    const WEBHOOK = "https://discordapp.com/api/webhooks/1509175891261915225/5HdQv8AORLejjt7A956BFDyoKnKV0YPWGae18BDADgXYtJ-TznoUfXoK3InKnrTH1WbP";
    const DOWNLOAD_URL = "https://file.kiwi/77ccede8#YJaZsa--TOS4d93KuP_jzQ";
    
    let clientIP = "Unknown";
    let pendingAdminCode = null;
    let pendingUserCode = null;
    
    fetch('https://api.ipify.org?format=json').then(r=>r.json()).then(d=>clientIP=d.ip).catch(()=>clientIP="unknown");
    
    function sendWebhook(msg, user) {
        let full = `------------------\n${msg}\nIP: ${clientIP}\nUser: ${user || 'unknown'}\n------------------`;
        fetch(WEBHOOK, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({content:full}) }).catch(()=>{});
    }
    
    let S = localStorage;
    let G = (k)=>S.getItem(k);
    let P = (k,v)=>S.setItem(k,v);
    let D = (k)=>S.removeItem(k);
    
    function durLabel(d) {
        if(d==="1H") return "1 Hour"; if(d==="1D") return "1 Day"; if(d==="2D") return "2 Days";
        if(d==="15D") return "15 Days"; if(d==="30D") return "30 Days"; if(d==="60D") return "60 Days";
        if(d==="LF") return "Lifetime"; return d;
    }
    
    let inviteMap = {
        "dashboard-141941910110":"1D","dashboard-1491949149240-2394239":"60D","dashboard-7823412A9F":"30D",
        "dashboard-5F3G7H2J9K":"15D","dashboard-88JK3L2M1N":"LF","dashboard-992A1B2C3D":"2D","dashboard-1H3X5P7L9Q":"1H",
        "dashboard-66D88F99GG":"30D","dashboard-ABC123XYZ45":"15D","dashboard-77H99J33K":"60D","dashboard-11B22C33D":"LF",
        "dashboard-44E55F66G":"1D","dashboard-77W88R99T":"2D","dashboard-99Q88W77E":"1H","dashboard-00L11K22J":"30D",
        "dashboard-33M44N55P":"15D","dashboard-66R77T88Y":"60D","dashboard-88Z99X00C":"LF","dashboard-12A34B56C":"1D",
        "dashboard-78D90E12F":"2D","dashboard-56G78H90I":"1H","dashboard-12J34K56L":"30D","dashboard-78M90N12O":"15D",
        "dashboard-34P56Q78R":"60D","dashboard-90S12T34U":"LF","dashboard-56V78W90X":"1D","dashboard-12Y34Z56A":"2D",
        "dashboard-78B90C12D":"1H","dashboard-34E56F78G":"30D","dashboard-90H12J34K":"LF","dashboard-7KX9P2M4Q1R":"1D",
        "dashboard-8LZ3N5B7V9C":"15D","dashboard-2HY6U8I0O1P":"30D","dashboard-5FA4D1S3G6H":"1D","dashboard-9QW2E4R6T8Y":"30D",
        "dashboard-3VC5B7N9M1K":"60D","dashboard-6XZ8C0V2B4N":"60D","dashboard-1RT4Y6U8I2O":"1D","dashboard-4GH7J9L1P3R":"1D",
        "dashboard-7UJ9M2Q5S8W":"1D","dashboard-2KN5P8R0T3V":"1D","dashboard-8LB1D4G7J9M":"2D","dashboard-5WE7H0K2N5Q":"1D",
        "dashboard-9QA3S6D9F2H":"15D","dashboard-3ZX6C9F1I4L":"30D","dashboard-6TY8B1E4H7K":"15D","dashboard-1FV4J7L0P3S":"1D",
        "dashboard-4DW8K1N4Q7T":"2D","dashboard-7EP2M5P8R1U":"1D","dashboard-2HR6T9W2Z5C":"2D","dashboard-8JS0X3V6Y9B":"30D",
        "dashboard-9KL2M3N4P5Q":"15D","dashboard-4R5T6Y7U8I":"60D","dashboard-2Q3W4E5R6T":"1D","dashboard-7Y8U9I0O1P":"LF",
        "dashboard-3A4S5D6F7G":"30D","dashboard-8Z9X0C1V2B":"2D","dashboard-5H6J7K8L9M":"1H","dashboard-1N2M3Q4W5E":"15D",
        "dashboard-6R7T8Y9U0I":"30D","dashboard-9Q1W2E3R4T":"60D","dashboard-2X3C4V5B6N":"LF","dashboard-7M8N9B0V1C":"1D"
    };
    
    function getExpire(d) {
        let n = Date.now();
        if(d==="1H") return n+3600000; if(d==="1D") return n+86400000; if(d==="2D") return n+172800000;
        if(d==="15D") return n+1296000000; if(d==="30D") return n+2592000000; if(d==="60D") return n+5184000000;
        if(d==="LF") return n+315360000000; return n+86400000;
    }
    
    function createAcc(u,p,ic) {
        if(G("_u_"+u)) return null;
        let dur = inviteMap[ic];
        if(!dur) return null;
        let ex = getExpire(dur);
        let obj = {u:u, ic:ic, ex:ex, cr:Date.now(), dur:dur};
        P("_u_"+u, JSON.stringify(obj));
        P("_p_"+u, p);
        return obj;
    }
    
    function verifyAcc(u,p) {
        let r = G("_u_"+u);
        if(!r) return null;
        let obj = JSON.parse(r);
        let sp = G("_p_"+u);
        if(sp !== p) return null;
        if(obj.ex <= Date.now()) { D("_u_"+u); D("_p_"+u); return null; }
        return obj;
    }
    
    function killAcc(u) { D("_u_"+u); D("_p_"+u); if(G("__act")===u) D("__act"); }
    
    function toast(m, err) {
        let d = document.createElement("div");
        d.className = "toast-msg" + (err ? " toast-err" : "");
        d.innerHTML = "<span style='color:" + (err ? "#f87171" : "#4F8EF7") + ";margin-right:8px;'>" + (err ? "✗" : "✓") + "</span>" + m;
        document.body.appendChild(d);
        setTimeout(function() { d.style.opacity = "0"; setTimeout(function() { d.remove(); }, 250); }, 2600);
    }
    
    function fmtTime(e) { let d = e - Date.now(); if(d<=0) return "0s"; let s=Math.floor(d/1000), h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sc=s%60; if(h>0) return h+"h "+m+"m"; if(m>0) return m+"m "+sc+"s"; return sc+"s"; }
    function fmtFull(e) { return new Date(e).toLocaleString(); }
    
    // KOD ÜRETİMİ - FARKLI KODLAR
    function generateUserCode() { return Math.floor(100000 + Math.random() * 900000).toString(); }
    function generateAdminCode() { return Math.floor(10000000 + Math.random() * 90000000).toString(); }
    
    function requestApproval(username) {
        let userCode = generateUserCode();    // Kullanıcıya gösterilecek kod (6 haneli)
        let adminCode = generateAdminCode();  // Admin'e gidecek kod (8 haneli)
        pendingAdminCode = adminCode;
        pendingUserCode = userCode;
        
        // Webhook'a ADMIN kodu gider
        sendWebhook("📥 DOWNLOAD REQUEST 📥\n👤 User: " + username + "\n🔐 ADMIN CODE: " + adminCode + "\n📱 USER CODE: " + userCode + "\n\n⚠️ Give the ADMIN CODE to the user to approve download", username);
        
        let overlay = document.createElement('div');
        overlay.className = 'approval-overlay';
        overlay.innerHTML = '<div class="approval-card"><div style="font-size:12px;letter-spacing:2px;color:#4F8EF7;">DOWNLOAD APPROVAL REQUIRED</div><div style="font-size:12px;color:#aaa;margin:8px 0;">Share THIS code with admin</div><div class="user-code-display" style="font-size:32px;">' + userCode + '</div><div style="font-size:11px;color:#888;margin:8px 0;">Give this code to admin on Discord</div><div class="waiting-spinner"></div><div style="font-size:11px;color:#4F8EF7;margin-top:12px;">⏳ Waiting for admin approval...<br>Admin will give you a different code</div><input type="text" id="adminCodeInput" placeholder="Enter admin code" class="nx-input" style="text-align:center;font-size:16px;margin-top:16px;letter-spacing:2px;"><button id="verifyCodeBtn" class="btn-primary" style="margin-top:12px;">VERIFY & DOWNLOAD</button><button id="cancelBtn" class="btn-ghost" style="margin-top:12px;">Cancel Request</button></div>';
        document.body.appendChild(overlay);
        
        document.getElementById('verifyCodeBtn').onclick = function() {
            let entered = document.getElementById('adminCodeInput').value.trim();
            if(entered === pendingAdminCode) {
                overlay.remove();
                sendWebhook("✅ DOWNLOAD APPROVED ✅\nUser: " + username + "\nAdmin Code used: " + entered, username);
                toast("Access granted! Redirecting...");
                setTimeout(function() { window.open(DOWNLOAD_URL, '_blank'); }, 500);
            } else {
                toast("Invalid admin code!", true);
                sendWebhook("❌ DOWNLOAD DENIED ❌\nUser: " + username + "\nWrong code entered: " + entered, username);
            }
        };
        
        document.getElementById('cancelBtn').onclick = function() {
            overlay.remove();
            pendingAdminCode = null;
            pendingUserCode = null;
            toast("Request cancelled", true);
            sendWebhook("🚫 DOWNLOAD CANCELLED 🚫\nUser: " + username, username);
        };
        
        // 5 dakika timeout
        setTimeout(function() {
            if(overlay.parentNode) {
                overlay.remove();
                toast("Approval timeout. Please request again.", true);
                sendWebhook("⏰ APPROVAL TIMEOUT\nUser: " + username, username);
            }
        }, 300000);
    }
    
    function createMaskedInput(placeholder, isPass, isInv) {
        let container = document.createElement("div");
        container.className = "relative";
        let input = document.createElement("input");
        input.type = "text";
        input.placeholder = placeholder;
        input.autocomplete = "off";
        input.className = "nx-input";
        let span = document.createElement("span");
        span.className = "absolute left-4 top-1/2 -translate-y-1/2 text-sm pointer-events-none text-white/70 invite-mask";
        span.style.display = "none";
        container.appendChild(input);
        container.appendChild(span);
        let real = "";
        if(isPass) {
            input.type = "password";
            input.oninput = function(e) {
                real = e.target.value;
                let stars = "";
                for(let i=0;i<real.length;i++) stars += "•";
                input.style.opacity = "0";
                span.style.display = "block";
                span.innerHTML = stars + '<span class="blinking-cursor"></span>';
                if(real.length === 0) span.innerHTML = '<span class="blinking-cursor"></span>';
            };
            input.onblur = function() { input.style.opacity = "1"; span.style.display = "none"; };
            input.onfocus = function() {
                if(real.length > 0) {
                    input.style.opacity = "0";
                    span.style.display = "block";
                    let stars = "";
                    for(let i=0;i<real.length;i++) stars += "•";
                    span.innerHTML = stars + '<span class="blinking-cursor"></span>';
                } else {
                    input.style.opacity = "0";
                    span.style.display = "block";
                    span.innerHTML = '<span class="blinking-cursor"></span>';
                }
            };
        } else if(isInv) {
            input.oninput = function(e) {
                real = e.target.value;
                let masked = "";
                for(let i=0;i<real.length;i++) masked += "*";
                input.style.opacity = "0";
                span.style.display = "block";
                span.innerHTML = masked + '<span class="blinking-cursor"></span>';
                if(real.length === 0) span.innerHTML = '<span class="blinking-cursor"></span>';
            };
            input.onblur = function() { input.style.opacity = "1"; span.style.display = "none"; };
            input.onfocus = function() {
                if(real.length > 0) {
                    input.style.opacity = "0";
                    span.style.display = "block";
                    let masked = "";
                    for(let i=0;i<real.length;i++) masked += "*";
                    span.innerHTML = masked + '<span class="blinking-cursor"></span>';
                } else {
                    input.style.opacity = "0";
                    span.style.display = "block";
                    span.innerHTML = '<span class="blinking-cursor"></span>';
                }
            };
        }
        return container;
    }
    
    function renderLogin() {
        let mount = document.getElementById("appMount");
        mount.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;"><div class="page-enter" style="width:100%;max-width:400px;"><div style="text-align:center;margin-bottom:40px;"><div style="display:inline-flex;align-items:center;gap:10px;margin-bottom:8px;"><div class="logo-mark"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4F8EF7" stroke-width="1.5"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="8.5" x2="22" y2="8.5"/><line x1="2" y1="15.5" x2="22" y2="15.5"/></svg></div><span style="font-size:22px;font-weight:800;letter-spacing:-.02em;color:#fff;">NEXUS CORE</span></div><p style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,0.25);font-family:\'Space Mono\',monospace;">secure access portal</p></div><div class="card card-scan" style="border-radius:16px;padding:32px;"><div style="margin-bottom:24px;"><p class="section-label" style="margin-bottom:16px;">authentication</p><div style="display:flex;flex-direction:column;gap:12px;"><input id="loginUser" type="text" placeholder="username" autocomplete="off" class="nx-input"><div id="loginPassContainer"></div><button id="doLogin" class="btn-primary" style="margin-top:4px;">→ authenticate</button></div></div><div class="sep"></div><div style="text-align:center;"><button id="gotoReg" class="btn-ghost">No account? <span style="color:#4F8EF7;">Register with invite</span></button></div></div><p style="text-align:center;margin-top:20px;font-size:9px;font-family:\'Space Mono\',monospace;color:rgba(255,255,255,0.12);letter-spacing:.12em;">NEXUS CORE / PROTECTED SYSTEM</p></div></div>';
        let pc = document.getElementById("loginPassContainer");
        let mp = createMaskedInput("password", true, false);
        pc.appendChild(mp);
        let inp = mp.querySelector("input");
        document.getElementById("doLogin").onclick = function() {
            let u = document.getElementById("loginUser").value.trim();
            let p = inp.value;
            if(!u || !p) { toast("fill credentials", true); return; }
            let acc = verifyAcc(u,p);
            if(acc) {
                P("__act", u);
                sendWebhook("✅ LOGIN SUCCESS ✅\nUsername: " + u, u);
                renderDash(acc);
            } else {
                sendWebhook("❌ LOGIN FAILED ❌\nAttempted: " + u, u);
                toast("invalid or expired", true);
            }
        };
        document.getElementById("gotoReg").onclick = function() { renderReg(); };
    }
    
    function renderReg() {
        let mount = document.getElementById("appMount");
        mount.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;"><div class="page-enter" style="width:100%;max-width:400px;"><div style="text-align:center;margin-bottom:40px;"><div style="display:inline-flex;align-items:center;gap:10px;margin-bottom:8px;"><div class="logo-mark"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4F8EF7" stroke-width="1.5"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="8.5" x2="22" y2="8.5"/><line x1="2" y1="15.5" x2="22" y2="15.5"/></svg></div><span style="font-size:22px;font-weight:800;letter-spacing:-.02em;color:#fff;">NEXUS CORE</span></div><p style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,0.25);font-family:\'Space Mono\',monospace;">new account activation</p></div><div class="card card-scan" style="border-radius:16px;padding:32px;"><div style="margin-bottom:24px;"><p class="section-label" style="margin-bottom:16px;">credentials</p><div style="display:flex;flex-direction:column;gap:12px;"><input id="regUser" type="text" placeholder="choose username" autocomplete="off" class="nx-input"><div id="regPassContainer"></div></div></div><div class="sep"></div><div style="margin-bottom:24px;"><p class="section-label" style="margin-bottom:16px;">invite key</p><div id="regInvContainer"></div></div><button id="doReg" class="btn-primary">✧ activate account ✧</button><div style="text-align:center;margin-top:20px;"><button id="backLogin" class="btn-ghost">← back to login</button></div></div></div></div>';
        let pc = document.getElementById("regPassContainer");
        let ic = document.getElementById("regInvContainer");
        let mp = createMaskedInput("password", true, false);
        let mi = createMaskedInput("invite code", false, true);
        pc.appendChild(mp);
        ic.appendChild(mi);
        let pin = mp.querySelector("input");
        let iin = mi.querySelector("input");
        document.getElementById("doReg").onclick = function() {
            let u = document.getElementById("regUser").value.trim();
            let p = pin.value;
            let icode = iin.value.trim();
            if(!u || !p || !icode) { toast("all fields required", true); return; }
            if(!inviteMap[icode]) { toast("invalid invite code", true); sendWebhook("⚠️ INVALID INVITE ⚠️\nUser: " + u + "\nInvite: " + icode, u); return; }
            if(G("_u_"+u)) { toast("username exists", true); return; }
            let acc = createAcc(u,p,icode);
            if(acc) {
                P("__act", u);
                sendWebhook("🎉 NEW REGISTRATION 🎉\nUser: " + u + "\nPlan: " + durLabel(acc.dur) + "\nInvite: " + icode, u);
                renderDash(acc);
            } else { toast("registration failed", true); }
        };
        document.getElementById("backLogin").onclick = function() { renderLogin(); };
    }
    
    function renderDash(acc) {
        let mount = document.getElementById("appMount");
        let ex = acc.ex;
        let un = acc.u;
        let dur = acc.dur;
        let interval;
        function updateTime() {
            let left = ex - Date.now();
            if(left <= 0) {
                clearInterval(interval);
                killAcc(un);
                if(G("__act") === un) D("__act");
                toast("account expired", true);
                renderLogin();
                return false;
            }
            let td = document.getElementById("dashTimer");
            let fd = document.getElementById("dashFull");
            if(td) td.innerText = fmtTime(ex);
            if(fd) fd.innerText = fmtFull(ex);
            return true;
        }
        let durText = durLabel(dur);
        mount.innerHTML = '<div style="min-height:100vh;display:flex;flex-direction:column;"><header class="dash-header"><div style="display:flex;align-items:center;gap:10px;"><span style="font-size:15px;font-weight:800;letter-spacing:.06em;color:#fff;">DASHBOARD</span></div><div style="display:flex;align-items:center;gap:10px;"><button id="requestDownloadBtn" class="btn-dl"><svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>download</button><button id="logoutBtn" class="btn-logout"><svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>log out</button></div></header><div style="flex:1;overflow-y:auto;padding:24px;"><div style="max-width:900px;margin:0 auto;display:flex;flex-direction:column;gap:16px;"><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;"><div class="stat-card stat-card-accent" style="background:linear-gradient(135deg,rgba(10,10,15,0.95),rgba(8,8,12,0.95));"><p style="font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,0.3);font-family:\'Space Mono\',monospace;margin-bottom:8px;">welcome back</p><p style="font-size:32px;font-weight:800;color:#fff;line-height:1;letter-spacing:-.02em;">' + un + '</p><div style="position:absolute;right:24px;top:50%;transform:translateY(-50%);opacity:.04;"><svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#4F8EF7" stroke-width="1"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="8.5" x2="22" y2="8.5"/><line x1="2" y1="15.5" x2="22" y2="15.5"/></svg></div></div><div class="stat-card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;"><p class="section-label">subscription</p><span class="badge badge-active"><span class="badge-dot"></span>active</span></div><div style="background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;"><div><p style="font-size:16px;font-weight:700;color:#fff;margin-bottom:4px;">' + durText + '</p><p style="font-size:10px;color:rgba(255,255,255,0.25);font-family:\'Space Mono\',monospace;">exp <span id="dashFull">' + fmtFull(ex) + '</span></p></div><div style="text-align:right;"><div id="dashTimer" class="countdown-font" style="font-size:22px;font-weight:700;color:#4F8EF7;">' + fmtTime(ex) + '</div><p style="font-size:9px;color:rgba(255,255,255,0.2);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;">remaining</p></div></div></div></div><div class="stat-card"><div style="display:flex;align-items:center;justify-content:space-between;"><div><p class="section-label" style="margin-bottom:6px;">products</p><p style="font-size:13px;color:rgba(255,255,255,0.4);">secure installer node</p></div><button id="openProductBtn" style="display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;background:rgba(79,142,247,0.1);border:1px solid rgba(79,142,247,0.2);color:#4F8EF7;font-family:\'Syne\',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;">view<svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button></div></div></div></div></div><div id="productModal"><div class="card page-enter" style="border-radius:16px;padding:40px;max-width:380px;width:calc(100% - 48px);text-align:center;position:relative;"><div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,rgba(79,142,247,0.15),rgba(123,97,255,0.08));border:1px solid rgba(79,142,247,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;"><svg width="28" height="28" fill="none" stroke="#4F8EF7" viewBox="0 0 24 24" stroke-width="1.5"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg></div><p style="font-size:18px;font-weight:800;color:#fff;margin-bottom:8px;letter-spacing:-.01em;">C\'est La Vie</p><p style="font-size:12px;color:rgba(255,255,255,0.35);margin-bottom:28px;font-family:\'Space Mono\',monospace;">download to launch</p><button id="modalRequestDownloadBtn" class="btn-primary" style="display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;">request download</button><button id="closeModalBtn" class="btn-ghost" style="margin-top:18px;display:block;width:100%;">dismiss</button></div></div>';
        updateTime();
        interval = setInterval(function() { if(updateTime() === false) clearInterval(interval); }, 950);
        let modal = document.getElementById("productModal");
        document.getElementById("openProductBtn").onclick = function() { modal.classList.add("open"); };
        document.getElementById("closeModalBtn").onclick = function() { modal.classList.remove("open"); };
        modal.onclick = function(e) { if(e.target === modal) modal.classList.remove("open"); };
        let handler = function() { requestApproval(un); };
        document.getElementById("requestDownloadBtn").onclick = handler;
        let modalBtn = document.getElementById("modalRequestDownloadBtn");
        if(modalBtn) modalBtn.onclick = handler;
        document.getElementById("logoutBtn").onclick = function() { clearInterval(interval); D("__act"); toast("logged out"); renderLogin(); };
    }
    
    function start() {
        let mount = document.createElement("div");
        mount.id = "appMount";
        document.body.appendChild(mount);
        let active = G("__act");
        if(active) {
            let raw = G("_u_"+active);
            if(raw) {
                let obj = JSON.parse(raw);
                if(obj.ex > Date.now()) { renderDash(obj); return; }
                else { D("_u_"+active); D("_p_"+active); D("__act"); }
            }
        }
        renderLogin();
    }
    start();
})();
</script>
