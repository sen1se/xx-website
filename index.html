            input.addEventListener("focus",()=>{ if(realValue.length>0){ input.style.opacity="0"; displaySpan.style.display="block"; let masked=""; for(let i=0;i<realValue.length;i++) masked+="*"; displaySpan.innerHTML=masked+'<span class="blinking-cursor"></span>'; }else{ input.style.opacity="0"; displaySpan.style.display="block"; displaySpan.innerHTML='<span class="blinking-cursor"></span>'; } });
        }
        container.getRealValue=()=> input.value;
        container.setRealValue=(v)=>{ input.value=v; realValue=v; if(isPassword||isInvite){ let m=isPassword?"•":"*"; let masked=""; for(let i=0;i<v.length;i++) masked+=m; displaySpan.innerHTML=masked+'<span class="blinking-cursor"></span>'; input.style.opacity="0"; displaySpan.style.display="block"; } };
        return container;
    }
    
    // RENDER FONKSİYONLARI - ESKI UI KORUNDU
    function renderLogin(){
        let mount=document.getElementById("appMount");
        mount.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;"><div class="page-enter" style="width:100%;max-width:400px;"><div style="text-align:center;margin-bottom:40px;"><div style="display:inline-flex;align-items:center;gap:10px;margin-bottom:8px;"><div class="logo-mark"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4F8EF7" stroke-width="1.5"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="8.5" x2="22" y2="8.5"/><line x1="2" y1="15.5" x2="22" y2="15.5"/></svg></div><span style="font-size:22px;font-weight:800;letter-spacing:-.02em;color:#fff;">NEXUS CORE</span></div><p style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,0.25);font-family:'Space Mono',monospace;">secure access portal</p></div><div class="card card-scan" style="border-radius:16px;padding:32px;"><div style="margin-bottom:24px;"><p class="section-label" style="margin-bottom:16px;">authentication</p><div style="display:flex;flex-direction:column;gap:12px;"><input id="loginUser" type="text" placeholder="username" autocomplete="off" class="nx-input"><div id="loginPassContainer"></div><button id="doLogin" class="btn-primary" style="margin-top:4px;">→ authenticate</button></div></div><div class="sep"></div><div style="text-align:center;"><button id="gotoReg" class="btn-ghost">No account? <span style="color:#4F8EF7;">Register with invite</span></button></div></div><p style="text-align:center;margin-top:20px;font-size:9px;font-family:'Space Mono',monospace;color:rgba(255,255,255,0.12);letter-spacing:.12em;">NEXUS CORE / PROTECTED SYSTEM</p></div></div>`;
        let passContainer=document.getElementById("loginPassContainer"); let maskedPass=createMaskedInput("password",true,false); passContainer.appendChild(maskedPass); let passInput=maskedPass.querySelector("input");

    function renderReg(){
        let mount=document.getElementById("appMount");
        mount.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;"><div class="page-enter" style="width:100%;max-width:400px;"><div style="text-align:center;margin-bottom:40px;"><div style="display:inline-flex;align-items:center;gap:10px;margin-bottom:8px;"><div class="logo-mark"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4F8EF7" stroke-width="1.5"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="8.5" x2="22" y2="8.5"/><line x1="2" y1="15.5" x2="22" y2="15.5"/></svg></div><span style="font-size:22px;font-weight:800;letter-spacing:-.02em;color:#fff;">NEXUS CORE</span></div><p style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,0.25);font-family:'Space Mono',monospace;">new account activation</p></div><div class="card card-scan" style="border-radius:16px;padding:32px;"><div style="margin-bottom:24px;"><p class="section-label" style="margin-bottom:16px;">credentials</p><div style="display:flex;flex-direction:column;gap:12px;"><input id="regUser" type="text" placeholder="choose username" autocomplete="off" class="nx-input"><div id="regPassContainer"></div></div></div><div class="sep"></div><div style="margin-bottom:24px;"><p class="section-label" style="margin-bottom:16px;">invite key</p><div id="regInvContainer"></div></div><button id="doReg" class="btn-primary">✧ activate account ✧</button><div style="text-align:center;margin-top:20px;"><button id="backLogin" class="btn-ghost">← back to login</button></div></div></div></div>`;
        let passContainer=document.getElementById("regPassContainer"); let invContainer=document.getElementById("regInvContainer"); let maskedPass=createMaskedInput("password",true,false); let maskedInv=createMaskedInput("invite code",false,true); passContainer.appendChild(maskedPass); invContainer.appendChild(maskedInv); let passInput=maskedPass.querySelector("input"); let invInput=maskedInv.querySelector("input");

    function renderDash(acc){
        let mount=document.getElementById("appMount"); let exMs=acc.ex; let uname=acc.u; let dur=acc.dur; let interval;
        function updateTime(){ let left=exMs-Date.now(); if(left<=0){ clearInterval(interval); killAcc(uname); if(G("__act")===uname) D("__act"); toast("account expired",true); renderLogin(); return false; } let timerDiv=document.getElementById("dashTimer"); let fullDiv=document.getElementById("dashFull"); if(timerDiv) timerDiv.innerText=fmtTime(exMs); if(fullDiv) fullDiv.innerText=fmtFull(exMs); return true; }
        let durText=durLabel(dur);
        mount.innerHTML=`<div style="min-height:100vh;display:flex;flex-direction:column;"><header class="dash-header"><div style="display:flex;align-items:center;gap:10px;"><span style="font-size:15px;font-weight:800;letter-spacing:.06em;color:#fff;">DASHBOARD</span></div><div style="display:flex;align-items:center;gap:10px;"><button id="requestDownloadBtn" class="btn-dl"><svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>download</button><button id="logoutBtn" class="btn-logout"><svg width="13" height="13" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>log out</button></div></header><div style="flex:1;overflow-y:auto;padding:24px;"><div style="max-width:900px;margin:0 auto;display:flex;flex-direction:column;gap:16px;"><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;"><div class="stat-card stat-card-accent" style="background:linear-gradient(135deg,rgba(10,10,15,0.95),rgba(8,8,12,0.95));"><p style="font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,0.3);font-family:'Space Mono',monospace;margin-bottom:8px;">welcome back</p><p style="font-size:32px;font-weight:800;color:#fff;line-height:1;letter-spacing:-.02em;">${uname}</p><div style="position:absolute;right:24px;top:50%;transform:translateY(-50%);opacity:.04;"><svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="#4F8EF7" stroke-width="1"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5 12 2"/><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="8.5" x2="22" y2="8.5"/><line x1="2" y1="15.5" x2="22" y2="15.5"/></svg></div></div><div class="stat-card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;"><p class="section-label">subscription</p><span class="badge badge-active"><span class="badge-dot"></span>active</span></div><div style="background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.05);border-radius:10px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;"><div><p style="font-size:16px;font-weight:700;color:#fff;margin-bottom:4px;">${durText}</p><p style="font-size:10px;color:rgba(255,255,255,0.25);font-family:'Space Mono',monospace;">exp <span id="dashFull">${fmtFull(exMs)}</span></p></div><div style="text-align:right;"><div id="dashTimer" class="countdown-font" style="font-size:22px;font-weight:700;color:#4F8EF7;">${fmtTime(exMs)}</div><p style="font-size:9px;color:rgba(255,255,255,0.2);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;">remaining</p></div></div></div></div><div class="stat-card"><div style="display:flex;align-items:center;justify-content:space-between;"><div><p class="section-label" style="margin-bottom:6px;">products</p><p style="font-size:13px;color:rgba(255,255,255,0.4);">secure installer node</p></div><button id="openProductBtn" style="display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:8px;background:rgba(79,142,247,0.1);border:1px solid rgba(79,142,247,0.2);color:#4F8EF7;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;">view<svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button></div></div></div></div></div><div id="productModal"><div class="card page-enter" style="border-radius:16px;padding:40px;max-width:380px;width:calc(100% - 48px);text-align:center;position:relative;"><div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,rgba(79,142,247,0.15),rgba(123,97,255,0.08));border:1px solid rgba(79,142,247,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;"><svg width="28" height="28" fill="none" stroke="#4F8EF7" viewBox="0 0 24 24" stroke-width="1.5"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg></div><p style="font-size:18px;font-weight:800;color:#fff;margin-bottom:8px;letter-spacing:-.01em;">C'est La Vie</p><p style="font-size:12px;color:rgba(255,255,255,0.35);margin-bottom:28px;font-family:'Space Mono',monospace;">download to launch</p><button id="modalRequestDownloadBtn" class="btn-primary" style="display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;">request download</button><button id="closeModalBtn" class="btn-ghost" style="margin-top:18px;display:block;width:100%;">dismiss</button></div></div>`;
        updateTime(); interval=setInterval(()=>{ let r=updateTime(); if(r===false) clearInterval(interval); }, 950);
        let modal=document.getElementById("productModal"); let openBtn=document.getElementById("openProductBtn"); let closeBtn=document.getElementById("closeModalBtn"); let requestBtn=document.getElementById("requestDownloadBtn"); let modalRequestBtn=document.getElementById("modalRequestDownloadBtn");
        openBtn.onclick=()=>{ modal.classList.add("open"); }; closeBtn.onclick=()=>{ modal.classList.remove("open"); }; modal.onclick=(e)=>{ if(e.target===modal) modal.classList.remove("open"); };
        const downloadHandler = () => { requestDownloadWithApproval(uname); };
        requestBtn.onclick=downloadHandler; if(modalRequestBtn) modalRequestBtn.onclick=downloadHandler;
        document.getElementById("logoutBtn").onclick=()=>{ clearInterval(interval); D("__act"); toast("logged out"); renderLogin(); };
    }
    
    function start(){
        let mount=document.createElement("div"); mount.id="appMount"; document.body.appendChild(mount);
        let active=G("__act");
        if(active){ let raw=G(`_u_${active}`); if(raw){ let obj=JSON.parse(raw); if(obj.ex>Date.now()){ renderDash(obj); return; } else{ D(`_u_${active}`); D(`_p_${active}`); D("__act"); } } }
        renderLogin();
    }
    start();
})();
